name: Scrape Subtitles

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Full scrape (all pages)?'
        required: false
        default: 'false'
        type: boolean
      pages:
        description: 'Number of pages to scrape'
        required: false
        default: '3'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Google Chrome and Xvfb
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scraper
        run: |
          cd backend
          if [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
            xvfb-run --auto-servernum python run_scraper.py --full
          else
            xvfb-run --auto-servernum python run_scraper.py --pages ${{ github.event.inputs.pages || '3' }}
          fi

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --cached --quiet || git commit -m "🔄 Auto-update subtitle data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push
